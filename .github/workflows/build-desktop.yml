name: Build Empire Meet desktop

# Produces the macOS (.dmg) and Windows (.exe) installers on real runners — no
# Wine, no cross-compile. Trigger by pushing a tag like v1.0.0, or run manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# The Release step (attaching installers) needs write access to repo contents.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build installer
        working-directory: desktop
        # identity:null in package.json makes macOS ad-hoc sign (unsigned);
        # disable cert auto-discovery so CI never blocks looking for one.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }}

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: empire-meet-${{ matrix.os }}
          path: |
            public/downloads/*.dmg
            public/downloads/*.exe
            public/downloads/*.AppImage
            public/downloads/*.zip
          if-no-files-found: warn

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            public/downloads/*.dmg
            public/downloads/*.exe
            public/downloads/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
