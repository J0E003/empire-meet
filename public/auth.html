<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Empire Meet — Sign in</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; position: relative; z-index: 1; }
    .auth-card {
      width: 100%; max-width: 420px; padding: 34px 32px 30px;
      background: rgba(18,18,28,0.62); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px; backdrop-filter: blur(22px);
      box-shadow: 0 40px 120px -30px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .auth-brand h1 { margin: 0; font-size: 24px; }
    .auth-tag { color: var(--muted, #9aa0b4); font-size: 13.5px; margin: 0 0 22px; }
    .auth-tabs { display: flex; gap: 6px; padding: 5px; background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; margin-bottom: 22px; }
    .auth-tab { flex: 1; padding: 10px; border: none; border-radius: 10px; background: transparent; color: var(--muted, #9aa0b4); font-weight: 600; font-size: 14px; cursor: pointer; transition: all .18s; }
    .auth-tab.active { background: linear-gradient(180deg, rgba(109,108,246,0.9), rgba(109,108,246,0.7)); color: #fff; box-shadow: 0 8px 24px -10px rgba(109,108,246,0.8); }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 12.5px; color: var(--muted, #9aa0b4); margin-bottom: 6px; font-weight: 600; }
    .auth-field .input { width: 100%; }
    .auth-card .btn-primary { width: 100%; margin-top: 6px; }
    .auth-err { color: #fca5a5; font-size: 13px; margin: 12px 0 0; min-height: 0; display: none; }
    .auth-err.show { display: block; }
    .auth-foot { text-align: center; color: var(--muted, #9aa0b4); font-size: 12.5px; margin: 18px 0 0; }
    .auth-switch { color: #a5a4fb; cursor: pointer; text-decoration: none; font-weight: 600; }
    .auth-switch:hover { text-decoration: underline; }
    form[hidden] { display: none; }
  </style>
</head>
<body class="landing">
  <div class="aurora"></div>

  <div class="auth-wrap">
    <main class="auth-card">
      <div class="auth-brand">
        <span class="brand-mark">◈</span>
        <h1 class="grad-text">Empire Meet</h1>
      </div>
      <p class="auth-tag" id="tag">Welcome back — sign in to start or join meetings.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign in</button>
        <button class="auth-tab" data-tab="register">Create account</button>
      </div>

      <!-- Sign in -->
      <form id="form-login" autocomplete="on">
        <div class="auth-field">
          <label for="li-email">Email</label>
          <input id="li-email" class="input" type="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="li-password">Password</label>
          <input id="li-password" class="input" type="password" placeholder="Your password" autocomplete="current-password" required />
        </div>
        <button class="btn btn-primary btn-lg" type="submit">Sign in</button>
      </form>

      <!-- Register -->
      <form id="form-register" autocomplete="on" hidden>
        <div class="auth-field">
          <label for="re-name">Full name</label>
          <input id="re-name" class="input" type="text" placeholder="Jane Doe" autocomplete="name" maxlength="60" required />
        </div>
        <div class="auth-field">
          <label for="re-email">Email</label>
          <input id="re-email" class="input" type="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="re-password">Password</label>
          <input id="re-password" class="input" type="password" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required />
        </div>
        <button class="btn btn-primary btn-lg" type="submit">Create account</button>
      </form>

      <p id="err" class="auth-err"></p>

      <p class="auth-foot" id="foot">
        New here? <a class="auth-switch" data-goto="register">Create an account</a>
      </p>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "/";
    let mode = "login";

    function setMode(m) {
      mode = m;
      document.querySelectorAll(".auth-tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === m));
      $("form-login").hidden = m !== "login";
      $("form-register").hidden = m !== "register";
      $("tag").textContent = m === "login"
        ? "Welcome back — sign in to start or join meetings."
        : "Create your account to host and join meetings.";
      $("foot").innerHTML = m === "login"
        ? 'New here? <a class="auth-switch" data-goto="register">Create an account</a>'
        : 'Already have an account? <a class="auth-switch" data-goto="login">Sign in</a>';
      hideErr();
    }
    function showErr(msg) { const e = $("err"); e.textContent = msg; e.classList.add("show"); }
    function hideErr() { $("err").classList.remove("show"); }

    document.addEventListener("click", (e) => {
      const tab = e.target.closest(".auth-tab");
      if (tab) return setMode(tab.dataset.tab);
      const sw = e.target.closest(".auth-switch");
      if (sw) { e.preventDefault(); setMode(sw.dataset.goto); }
    });

    async function submit(url, payload, btn) {
      hideErr();
      const label = btn.textContent; btn.disabled = true; btn.textContent = "Please wait…";
      try {
        const r = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) { showErr(data.error || "Something went wrong. Try again."); return; }
        location.href = next; // signed in — cookie set by the server
      } catch {
        showErr("Couldn't reach the server. Check your connection.");
      } finally {
        btn.disabled = false; btn.textContent = label;
      }
    }

    $("form-login").addEventListener("submit", (e) => {
      e.preventDefault();
      submit("/api/login", { email: $("li-email").value, password: $("li-password").value }, e.submitter || $("form-login").querySelector("button"));
    });
    $("form-register").addEventListener("submit", (e) => {
      e.preventDefault();
      submit("/api/register", { name: $("re-name").value, email: $("re-email").value, password: $("re-password").value }, e.submitter || $("form-register").querySelector("button"));
    });

    // If already signed in, skip straight through.
    fetch("/api/me").then((r) => { if (r.ok) location.href = next; }).catch(() => {});
    if (params.get("mode") === "register") setMode("register");
  </script>
</body>
</html>
